kind = "web"
previewPath = "/"
title = "Jayce Catering Company"
version = "1.0.0"
id = "artifacts/jayce-catering"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23141

[services.development]
run = "pnpm --filter @workspace/jayce-catering run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/jayce-catering", "run", "build" ]
publicDir = "artifacts/jayce-catering/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23141"
BASE_PATH = "/"
